name: Claude Auto-Fix

on:
  push:
    branches: [develop, dev]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Auto-Fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get files changed in last commit
          FILES=$(git diff --name-only HEAD~1 HEAD)

          # Run lint fix with budget cap
          claude -p "Fix linting issues, type errors, and formatting problems in these files. Only make minimal fixes — do not refactor or add features. Files:\n$FILES" \
            --model haiku \
            --max-budget-usd 3.00 \
            --allowedTools Edit,Read,Glob,Grep 2>&1 || true

      - name: Commit fixes
        run: |
          git config user.name "Claude Code"
          git config user.email "noreply@anthropic.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No fixes needed"
          else
            git commit -m "fix: auto-fix lint and formatting issues

          Co-Authored-By: Claude Code <noreply@anthropic.com>"
            git push
          fi
